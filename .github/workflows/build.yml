name: Build

on:
  push:
    branches-ignore: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Configure unit tests
        run: cmake -S tests -B build/tests -G "Visual Studio 17 2022" -A x64

      - name: Build unit tests
        run: cmake --build build/tests --config Release

      - name: Run unit tests
        run: ctest --test-dir build/tests -C Release --output-on-failure

  build:
    name: Build DLL
    runs-on: windows-2022
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild TreblleAgent.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreblleAgent-${{ github.sha }}
          path: x64/Release/TreblleAgent.dll
          retention-days: 30

      - name: Upload DLL to release
        uses: softprops/action-gh-release@v2
        with:
          files: x64/Release/TreblleAgent.dll
